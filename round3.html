<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Round 3 — Women's Day Celebration</title>
    <meta name="description"
        content="Round 3 entries for the Women's Day Celebration. Click any folder to view the entry image." />

    <!-- Shared stylesheet -->
    <link rel="stylesheet" href="css/styles.css" />

    <style>
        code {
            background: #f0f0f0;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>

<body>

    <!-- ================================================================
     ROUND 3 PAGE
     Identical structure to round2.html — only the data-round and
     data-label attributes differ, so the JS loads different images.
================================================================ -->
    <main class="round-page">

        <!-- ── Back link to hero page ── -->
        <a href="index.html" class="back-btn" aria-label="Back to home">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                aria-hidden="true">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Back
        </a>

        <!-- ── Page heading ── -->
        <h1 class="round-title" style="font-size: 40px; color: white;">Round 3 - Who Am I ?</h1>

        <!--
    ── Folder grid — Section 1 (folders 1–5) ──
    data-round : subfolder name inside /images/  (images/round3/)
    data-label : used in the lightbox header label
    data-start / data-end : range of folder numbers to render
  -->
        <h2 class="section-subtitle">Guess the logo ?</h2>
        <div class="folders-grid" id="folders-grid-1" data-round="round3" data-label="Round 3" data-start="1"
            data-end="5" role="list" aria-label="Round 3 logo entries">
            <!-- Folder cards 1–5 injected here by js/main.js -->
        </div>

        <!--
    ── Folder grid — Section 2 (folders 6–10) ──
  -->
        <h2 class="section-subtitle">Guess the famous Women in Tech ?</h2>
        <div class="folders-grid" id="folders-grid-2" data-round="round3" data-label="Round 3" data-start="6"
            data-end="10" data-display-start="1" role="list" aria-label="Round 3 women in tech entries">
            <!-- Folder cards 6–10 injected here by js/main.js -->
        </div>

    </main>

    <!-- Shared JS: renders folders + drives the lightbox -->
    <script src="js/main.js"></script>

</body>

</html>
